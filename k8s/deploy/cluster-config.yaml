# Lab-safe template values. For real deployments, copy this file to
# cluster-config.local.yaml, replace every REPLACE_ME value there, and run
# scripts with YAS_CLUSTER_CONFIG=cluster-config.local.yaml.
domain: yas.local
postgresql:
  replicas: 1
  username: yasadminuser
  password: REPLACE_ME_POSTGRES_PASSWORD
kafka:
  replicas: 1
zookeeper:
  replicas: 1
elasticsearch:
  replicas: 1
  username: yas
  password: REPLACE_ME_ELASTICSEARCH_PASSWORD
keycloak:
  bootstrapAdmin:
    username: admin
    password: REPLACE_ME_KEYCLOAK_BOOTSTRAP_PASSWORD
  backofficeRedirectUrl: http://backoffice.yas.local
  storefrontRedirectUrl: http://storefront.yas.local
grafana:
  username: admin
  password: REPLACE_ME_GRAFANA_PASSWORD
redis:
  password: REPLACE_ME_REDIS_PASSWORD
